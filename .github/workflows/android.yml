 name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/minchun/app

          echo 'plugins { id "com.android.application" }' > build.gradle

          echo 'buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:7.4.2" }
          }
          allprojects { repositories { google(); mavenCentral() } }' >> build.gradle

          echo 'android {
            compileSdk 33
            defaultConfig {
              applicationId "com.minchun.app"
              minSdk 21
              targetSdk 33
              versionCode 1
              versionName "1.0"
            }
          }' > app/build.gradle

          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.minchun.app">
            <application android:label="Minchun">
              <activity android:name=".MainActivity">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo 'package com.minchun.app

import android.os.Bundle
import android.widget.*
import androidx.appcompat.app.AppCompatActivity

class MainActivity : AppCompatActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)

        val layout = LinearLayout(this)
        layout.orientation = LinearLayout.VERTICAL

        val text = TextView(this)
        text.text = "Minchun Baccarat Tool"